env = "production"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = false
ShowRssButtonInSectionTermList = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
hidemeta = false
hideSummary = false
showtoc = true

  [params.assets]
    favicon = "/images/favicon.ico"

  [params.label]
    text = "Dominic-André Leclerc"

  [params.homeInfoParams]
    Title = "Bridging Military Precision and AI Governance"
    Content = """
I help Quebec and Canadian organizations adopt AI responsibly — with the discipline of 21 years in the Canadian Armed Forces and the clarity of someone who's built it from the ground up.

Whether you're exploring your first AI pilot or building a governance framework, I'll help you get it right.
"""

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/dominic-andré-leclerc-4ab90a250/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/DA-Leclerc"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:domleclerc@gmail.com"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = true

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]
