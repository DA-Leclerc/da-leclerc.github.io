baseURL = "https://da-leclerc.github.io/"
title = "Dominic-André Leclerc"
theme = "PaperMod"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = false
pygmentsUseClasses = true

[pagination]
    pagerSize = 10

[minify]
    disableXML = true
    minifyOutput = true

[outputs]
    home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ── Parameters ──────────────────────────────────────────────────────────────────

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShareButtons = ["linkedin"]
  ShowPostNavLinks = true
  description = "Dominic-Andre Leclerc - AI Governance Advisor helping organizations adopt AI responsibly."
  images = ["/images/og-default.svg"]
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  author = "Dominic-André Leclerc"
  keywords = ["AI governance", "AI compliance", "AI readiness", "Quebec", "Canada", "Loi 25", "AIDA", "consulting"]

  [params.assets]
    favicon = "/images/favicon.svg"

  [params.label]
    text = "Dominic-André Leclerc"

  [params.homeInfoParams]
    Title = "Paradigm Shift: Practical AI for Real Organizations"
    Content = "AI adoption is moving fast. Governance is not keeping up. This blog is about closing that gap: practical frameworks, real-world lessons, and honest takes on what it actually takes to adopt AI responsibly.<br><br>Based in Quebec, writing for anyone bringing AI into their organization, whether you're evaluating your first use case or scaling across the company.<br><br><a href='/about/' class='cta-button'>Learn More About Me</a>"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/dominic-andr%C3%A9-leclerc-4ab90a250/"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/DA-Leclerc"
  [[params.socialIcons]]
    name = "email"
    url = "/contact/"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = true

  [params.editPost]
    disabled = true

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

# ── Languages ─────────────────────────────────────────────────────────────────

[languages]

  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
    title = "Dominic-André Leclerc | AI Advisor"
    contentDir = "content/en"

    [languages.en.params]
      description = "AI Governance & Adoption Advisor. Former CAF Warrant Officer, AF9000+ Lead Auditor. Helping Quebec and Canadian organizations adopt AI responsibly."

    [languages.en.params.homeInfoParams]
      Title = "Paradigm Shift: Practical AI for Real Organizations"
      Content = "AI adoption is moving fast. Governance is not keeping up. This blog is about closing that gap: practical frameworks, real-world lessons, and honest takes on what it actually takes to adopt AI responsibly.<br><br>Based in Quebec, writing for anyone bringing AI into their organization, whether you're evaluating your first use case or scaling across the company.<br><br><a href='/about/' class='cta-button'>Learn More About Me</a>"

  [languages.fr]
    languageName = "Français"
    languageCode = "fr"
    weight = 2
    title = "Dominic-André Leclerc | Conseiller IA"
    contentDir = "content/fr"

    [languages.fr.params]
      description = "Conseiller en gouvernance et adoption responsable de l'IA. Ancien adjudant des FAC, auditeur principal AF9000+. J'aide les organisations québécoises et canadiennes à adopter l'IA de façon responsable."

    [languages.fr.params.homeInfoParams]
      Title = "Changement de paradigme : l'IA pratique pour les vraies organisations"
      Content = "L'adoption de l'IA va vite. La gouvernance ne suit pas. Ce blogue vise a combler cet écart : des cadres pratiques, des leçons terrain, et des prises de position honnêtes sur ce que ça prend vraiment pour adopter l'IA de façon responsable.<br><br>Basé au Québec, j'écris pour quiconque envisage d'intégrer l'IA dans son organisation, que vous en soyez à la réflexion ou déjà en pleine implantation.<br><br><a href='/fr/a-propos/' class='cta-button'>En savoir plus</a>"

