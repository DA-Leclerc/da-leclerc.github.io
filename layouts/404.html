{{ define "main" }}
<style>
  .error-container {
    text-align: center;
    padding: 4rem 1rem;
    max-width: 600px;
    margin: 0 auto;
  }
  .error-code {
    font-size: 6rem;
    font-weight: 800;
    letter-spacing: -0.05em;
    background: linear-gradient(135deg, #0f2744 0%, #0e7490 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
    line-height: 1;
  }
  [data-theme="dark"] .error-code {
    background: linear-gradient(135deg, #22d3ee 0%, #67e8f9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .error-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin: 1rem 0 0.5rem;
    color: var(--primary);
  }
  .error-description {
    color: var(--secondary);
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .error-home-link {
    display: inline-block;
    background: linear-gradient(135deg, #0e7490 0%, #06b6d4 100%);
    color: #ffffff !important;
    border-radius: 8px;
    padding: 12px 28px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 4px 12px rgba(14, 116, 144, 0.25);
    transition: all 0.25s ease;
  }
  .error-home-link:hover {
    box-shadow: 0 6px 20px rgba(14, 116, 144, 0.35);
    transform: translateY(-1px);
  }
</style>

<div class="error-container">
  <p class="error-code">404</p>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-description">
    The page you're looking for doesn't exist or has been moved.
    Let's get you back on track.
  </p>
  <a href="{{ "" | relLangURL }}" class="error-home-link">Back to Home</a>
</div>
{{ end }}
