<!-- Open Graph & SEO enhancements -->
<meta property="og:site_name" content="Dominic-André Leclerc -- AI Advisor" />
<meta name="author" content="Dominic-André Leclerc" />

<!-- Geo targeting -->
<meta name="geo.region" content="CA-QC" />
<meta name="geo.placename" content="Saguenay" />

<!-- Language alternates for bilingual SEO -->
{{ if .IsTranslated }}
{{ range .Translations }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
{{ end }}
<link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
{{ end }}

<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}" />

<!-- SVG Favicon -->
<link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.svg">

<!-- Reading Progress Bar -->
{{ if .IsPage }}
<div class="reading-progress" id="reading-progress"></div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var progressBar = document.getElementById('reading-progress');
  if (!progressBar) return;
  window.addEventListener('scroll', function() {
    var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var scrolled = (winScroll / height) * 100;
    progressBar.style.width = scrolled + '%';
  });
});
</script>
{{ end }}

<!-- Structured Data (JSON-LD) - Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Dominic-Andr\u00e9 Leclerc",
  "url": "https://da-leclerc.github.io",
  "jobTitle": "AI Governance Advisor",
  "description": "Bridging Military Precision and AI Governance",
  "knowsAbout": ["AI Governance", "Responsible AI", "Military Strategy", "AIDA Act"],
  "address": {
    "@type": "PostalAddress",
    "addressRegion": "Quebec",
    "addressCountry": "Canada"
  }
}
</script>

<!-- Structured Data (JSON-LD) - Article (blog posts only) -->
{{ if and .IsPage (eq .Section "blog") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ .Title }}",
  "description": "{{ .Description }}",
  "author": {
    "@type": "Person",
    "name": "Dominic-Andr\u00e9 Leclerc",
    "url": "https://da-leclerc.github.io"
  },
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  {{ if .Lastmod }}"dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",{{ end }}
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "publisher": {
    "@type": "Person",
    "name": "Dominic-Andr\u00e9 Leclerc"
  }{{ if .Params.cover }}{{ if .Params.cover.image }},
  "image": "{{ .Params.cover.image | absURL }}"{{ end }}{{ end }}
}
</script>
{{ end }}

<!-- Back to Top Button -->
<button class="back-to-top" id="back-to-top" aria-label="Back to top">
  <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  window.addEventListener('scroll', function() {
    if (window.scrollY > 400) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>

<!-- Sticky Nav on Scroll (homepage hero) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var heroWrap = document.querySelector('.hero-header-wrap');
  var heroNav = document.querySelector('.hero-nav');
  if (!heroWrap || !heroNav) return;

  var heroHeight = document.querySelector('.hero-header').offsetHeight;
  var placeholder = document.createElement('div');
  placeholder.style.display = 'none';
  placeholder.style.height = heroNav.offsetHeight + 'px';
  heroWrap.parentNode.insertBefore(placeholder, heroWrap.nextSibling);

  window.addEventListener('scroll', function() {
    if (window.scrollY > heroHeight - heroNav.offsetHeight) {
      if (!heroNav.classList.contains('is-sticky')) {
        heroNav.classList.add('is-sticky');
        placeholder.style.display = 'block';
      }
    } else {
      heroNav.classList.remove('is-sticky');
      placeholder.style.display = 'none';
    }
  });
});
</script>

<!-- Lazy Loading for Images -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  var images = document.querySelectorAll('.post-content img');
  images.forEach(function(img) {
    if (!img.hasAttribute('loading')) {
      img.setAttribute('loading', 'lazy');
    }
    if (!img.hasAttribute('decoding')) {
      img.setAttribute('decoding', 'async');
    }
  });
});
</script>
