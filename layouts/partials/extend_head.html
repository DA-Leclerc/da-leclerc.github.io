<!-- Open Graph & SEO enhancements -->
<meta property="og:site_name" content="Dominic-André Leclerc — AI Advisor" />
<meta name="author" content="Dominic-André Leclerc" />

<!-- Geo targeting -->
<meta name="geo.region" content="CA-QC" />
<meta name="geo.placename" content="Saguenay" />

<!-- Language alternates for bilingual SEO -->
{{ if .IsTranslated }}
  {{ range .Translations }}
    <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
  {{ end }}
  <link rel="alternate" hreflang="{{ .Lang }}" href="{{ .Permalink }}" />
{{ end }}

<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}" />
