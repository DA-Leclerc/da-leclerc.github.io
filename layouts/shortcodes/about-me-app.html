<div style="width:100%; max-width:1200px; margin:2rem auto; border-radius:12px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.15);">
  <iframe
    src="https://dominic-about-me.vercel.app{{ with .Get "lang" }}?lang={{ . }}{{ end }}"
    style="width:100%; height:800px; border:none;"
    loading="lazy"
    title="{{ .Get "title" | default "Dominic-André Leclerc — Interactive About Me" }}"
    allow="clipboard-write"
  ></iframe>
</div>
<p style="text-align:center; font-size:0.85rem; color:#888; margin-top:0.5rem;">
  {{ .Get "footer" | default "Built with Next.js and Claude" }} · <a href="https://dominic-about-me.vercel.app{{ with .Get "lang" }}?lang={{ . }}{{ end }}" target="_blank" rel="noopener">{{ .Get "linktext" | default "Open full screen ↗" }}</a>
</p>
